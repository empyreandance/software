<title>Cooke Studios LLC — Apps</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #0a0a0a;
    --card: #161616;
    --card-hover: #1f1f1f;
    --border: #2a2a2a;
    --border-hover: #484848;
    --text: #f2f2f2;
    --muted: #a2a2a2;
    --faint: #6a6a6a;
    --live: #87d4a8;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { background: var(--bg); }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 4.2rem 1.4rem 3.5rem;
    display: flex;
    justify-content: center;
  }
  main {
    max-width: 60rem;
    width: 100%;
    min-width: 0;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeIn 0.8s ease forwards;
  }
  @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

  .crumb {
    font-size: 0.72rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--faint);
    margin-bottom: 0.9rem;
  }
  .crumb a { color: var(--faint); text-decoration: none; transition: color 0.2s ease; }
  .crumb a:hover { color: var(--text); }

  h1 {
    font-size: 2.7rem;
    font-weight: 300;
    letter-spacing: -1px;
    color: #fff;
    margin-bottom: 0.9rem;
    text-wrap: balance;
  }
  .intro {
    color: var(--muted);
    max-width: 38rem;
    margin-bottom: 3.2rem;
    text-wrap: pretty;
  }

  .section-label {
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--faint);
    padding-top: 1.1rem;
    border-top: 1px solid var(--border);
    margin-bottom: 1.2rem;
  }
  .section + .section .section-label { margin-top: 2.8rem; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(15.5rem, 1fr));
    gap: 0.9rem;
  }
  .tile {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.3rem 1.3rem 1.15rem;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    color: inherit;
    text-decoration: none;
    transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
  }
  .tile:hover, .tile:focus-visible {
    background: var(--card-hover);
    border-color: var(--border-hover);
    transform: translateY(-2px);
  }
  .tile img { width: 56px; height: 56px; border-radius: 13px; display: block; }
  .tile h2 { font-size: 1.08rem; font-weight: 600; margin-top: 0.2rem; letter-spacing: -0.01em; }
  .tile .tag { font-size: 0.88rem; color: var(--muted); flex-grow: 1; text-wrap: pretty; }
  .tile .meta { margin-top: 0.4rem; }

  .meta {
    font-size: 0.67rem;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: var(--faint);
  }
  .meta .state-live { color: var(--live); font-weight: 600; }

  footer {
    margin-top: 3.4rem;
    border-top: 1px solid var(--border);
    padding-top: 1.4rem;
    font-size: 0.85rem;
    color: var(--faint);
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }
  footer a { color: var(--faint); text-decoration: none; border-bottom: 1px solid var(--border); transition: color 0.2s ease, border-color 0.2s ease; }
  footer a:hover { color: var(--text); border-color: var(--border-hover); }

  /* ---- modal ---- */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.65);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.2rem;
    z-index: 10;
    animation: overlayIn 0.22s ease;
  }
  @keyframes overlayIn { from { opacity: 0; } }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    max-width: 46rem;
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    padding: 2rem 2.1rem 1.8rem;
    position: relative;
    animation: modalIn 0.26s ease;
  }
  @keyframes modalIn { from { opacity: 0; transform: translateY(14px); } }
  .modal-close {
    position: absolute;
    top: 1rem;
    right: 1rem;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 1.05rem;
    line-height: 1;
    cursor: pointer;
    transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
  }
  .modal-close:hover, .modal-close:focus-visible { color: #fff; border-color: var(--border-hover); background: var(--card-hover); }
  .modal-head { display: flex; align-items: center; gap: 1.2rem; margin-bottom: 1.4rem; padding-right: 2.4rem; }
  .modal-head img { width: 76px; height: 76px; border-radius: 17px; flex-shrink: 0; }
  .modal-head h1 { font-size: 1.65rem; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 0.3rem; }
  .modal p.body { color: #cfcfcf; margin-bottom: 1rem; font-size: 0.95rem; text-wrap: pretty; }

  .gallery {
    display: flex;
    gap: 0.7rem;
    overflow-x: auto;
    margin: 1.5rem -2.1rem 0;
    padding: 0 2.1rem 0.5rem;
    scroll-snap-type: x proximity;
  }
  .gallery figure { flex-shrink: 0; scroll-snap-align: start; }
  .gallery img {
    height: 215px;
    width: auto;
    border-radius: 10px;
    border: 1px solid var(--border);
    display: block;
    cursor: zoom-in;
    transition: border-color 0.2s ease, filter 0.2s ease;
  }
  .gallery img:hover { border-color: var(--border-hover); filter: brightness(1.08); }
  .gallery figcaption { font-size: 0.72rem; color: var(--faint); margin-top: 0.45rem; }

  /* ---- lightbox ---- */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.88);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.9rem;
    padding: 2.2rem 1rem 1.6rem;
    z-index: 20;
    animation: overlayIn 0.18s ease;
    cursor: zoom-out;
  }
  .lightbox img {
    max-width: min(92vw, 60rem);
    max-height: 80vh;
    border-radius: 12px;
    border: 1px solid var(--border-hover);
    cursor: default;
  }
  .lightbox .lb-cap { font-size: 0.85rem; color: var(--muted); text-align: center; }
  .lightbox .lb-count { font-size: 0.72rem; letter-spacing: 0.13em; color: var(--faint); }
  .lightbox .modal-close { position: fixed; top: 1.1rem; right: 1.1rem; }
  .lb-nav {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 1px solid var(--border-hover);
    background: rgba(22, 22, 22, 0.85);
    color: var(--muted);
    font-size: 1.2rem;
    line-height: 1;
    cursor: pointer;
    transition: color 0.2s ease, background 0.2s ease;
  }
  .lb-nav:hover, .lb-nav:focus-visible { color: #fff; background: var(--card-hover); }
  .lb-nav.prev { left: 1rem; }
  .lb-nav.next { right: 1rem; }
  @media (max-width: 600px) {
    .lb-nav.prev { left: 0.4rem; }
    .lb-nav.next { right: 0.4rem; }
  }

  .features { list-style: none; margin-top: 1.6rem; }
  .features li {
    border-top: 1px solid var(--border);
    padding: 0.65rem 0;
    font-size: 0.88rem;
    color: var(--muted);
  }
  .features li:last-child { border-bottom: 1px solid var(--border); }
  .fine { font-size: 0.78rem; color: var(--faint); margin-top: 1.1rem; }
  .actions { margin-top: 1.5rem; display: flex; gap: 0.7rem; flex-wrap: wrap; }
  .actions a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.88rem;
    padding: 0.5rem 1.05rem;
    border: 1px solid var(--border);
    border-radius: 30px;
    transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
  }
  .actions a:hover, .actions a:focus-visible { color: #fff; background: var(--card-hover); border-color: var(--border-hover); }
  .actions a.primary { color: var(--text); border-color: var(--border-hover); }
  .support { margin-top: 1.9rem; padding-top: 1.2rem; border-top: 1px solid var(--border); font-size: 0.85rem; color: var(--faint); }
  .support a { color: var(--muted); text-decoration: none; border-bottom: 1px solid var(--border); transition: color 0.2s ease, border-color 0.2s ease; }
  .support a:hover { color: var(--text); border-color: var(--border-hover); }

  a:focus-visible, button:focus-visible { outline: 2px solid var(--border-hover); outline-offset: 3px; }

  @media (prefers-reduced-motion: reduce) {
    main, .overlay, .modal, .lightbox { animation: none; }
    main { opacity: 1; transform: none; }
    .tile, .tile:hover { transition: none; transform: none; }
  }
</style>

<main id="root">
  <noscript>

function tile(app) {
  return `
    <a class="tile" href="#/${app.slug}">
      <img src="${ICONS[app.slug]}" alt="" width="56" height="56">
      <h2>${app.name}</h2>
      <p class="tag">${app.tag}</p>
      <p class="meta">${app.meta}</p>
    </a>`;
}

function homeView() {
  const section = (label) => `
    <section class="section">
      <p class="section-label">${label}</p>
      <div class="grid">
        ${APPS.filter(a => a.section === label).map(tile).join("")}
      </div>
    </section>`;
  return `
    <p class="crumb"><a href="https://alexcooke.co">alexcooke.co</a> / apps</p>
    <h1>Cooke Studios LLC</h1>
    <p class="intro">
      The software studio of Alex Cooke — apps for the forecast desk, the
      announcer's stand, the running trail, and wherever you happen to be
      standing.
    </p>
    ${section("iPhone")}
    ${section("Desktop")}
    ${FOOTER}`;
}

function modalView(app) {

    <div class="gallery">
      ${shots.map((s, i) => `
        <figure>
          <img src="${s.src}" alt="${s.cap}" loading="lazy" data-lb="${app.slug}:${i}">
          <figcaption>${s.cap}</figcaption>
        </figure>`).join("")}
    </div>` : "";

    ? `<div class="actions">${app.actions.map(a =>

    : "";
  return `
    <div class="overlay" id="overlay">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button class="modal-close" id="modal-close" aria-label="Close">&#10005;</button>
        <div class="modal-head">
          <img src="${ICONS[app.slug]}" alt="" width="76" height="76">
          <div>
            <h1 id="modal-title">${app.name}</h1>
            <p class="meta">${app.meta}</p>
          </div>
        </div>
        ${app.body.map(p => `<p class="body">${p}</p>`).join("")}
        ${gallery}
        <ul class="features">${app.features.map(f => `<li>${f}</li>`).join("")}</ul>
        ${app.fine ? `<p class="fine">${app.fine}</p>` : ""}
        ${actions}
        <p class="support">
          Questions about ${app.name}? <a href="${CONTACT}">Get in touch</a>.
        </p>
      </div>
    </div>`;
}

let lastFocus = null;
let lb = null; // {slug, idx}

function lightboxView() {
  const shots = SHOTS[lb.slug];
  const s = shots[lb.idx];
  const many = shots.length > 1;
  return `
    <div class="lightbox" id="lightbox">
      <button class="modal-close" id="lb-close" aria-label="Close image">&#10005;</button>
      ${many ? '<button class="lb-nav prev" id="lb-prev" aria-label="Previous image">&#8249;</button>' : ""}
      <img src="${s.src}" alt="${s.cap}">
      <div class="lb-cap">${s.cap}</div>
      ${many ? `<div class="lb-count">${lb.idx + 1} / ${shots.length}</div>` : ""}
      ${many ? '<button class="lb-nav next" id="lb-next" aria-label="Next image">&#8250;</button>' : ""}
    </div>`;
}

function renderLightbox() {
  const root = document.getElementById("lightbox-root");
  if (!lb) { root.innerHTML = ""; return; }
  root.innerHTML = lightboxView();
  const box = document.getElementById("lightbox");
  box.addEventListener("click", e => { if (e.target === box) closeLightbox(); });
  document.getElementById("lb-close").addEventListener("click", closeLightbox);
  const prev = document.getElementById("lb-prev"), next = document.getElementById("lb-next");
  if (prev) prev.addEventListener("click", () => navLightbox(-1));
  if (next) next.addEventListener("click", () => navLightbox(1));
  document.getElementById("lb-close").focus();
}

function openLightbox(slug, idx) {
  lb = { slug, idx };
  renderLightbox();
}
function closeLightbox() {
  lb = null;
  renderLightbox();
  const mc = document.getElementById("modal-close");
  if (mc) mc.focus();
}
function navLightbox(d) {
  const n = SHOTS[lb.slug].length;
  lb.idx = (lb.idx + d + n) % n;
  renderLightbox();
}

function closeModal() {
  if (location.hash && location.hash !== "#" && location.hash !== "#/") {
    location.hash = "#/";
  }
}

function render() {
  const slug = location.hash.replace(/^#\/?/, "");
  const app = APPS.find(a => a.slug === slug);
  const root = document.getElementById("root");
  const modalRoot = document.getElementById("modal-root");

  if (!root.dataset.ready) {
    root.innerHTML = homeView();
    root.dataset.ready = "1";
  }

  if (app) {
    lastFocus = document.activeElement;
    modalRoot.innerHTML = modalView(app);
    document.body.style.overflow = "hidden";
    document.title = `${app.name} — Cooke Studios LLC`;
    const overlay = document.getElementById("overlay");
    overlay.addEventListener("click", e => { if (e.target === overlay) closeModal(); });
    document.getElementById("modal-close").addEventListener("click", closeModal);
    overlay.querySelectorAll("[data-lb]").forEach(img => {
      img.addEventListener("click", () => {
        const [slug, idx] = img.dataset.lb.split(":");
        openLightbox(slug, Number(idx));
      });
    });
    document.getElementById("modal-close").focus();
  } else {
    modalRoot.innerHTML = "";
    document.body.style.overflow = "";
    document.title = "Cooke Studios LLC — Apps";
    if (lastFocus && document.contains(lastFocus)) lastFocus.focus();
    lastFocus = null;
  }
  if (lb) closeLightbox();
}

document.addEventListener("keydown", e => {
  if (lb) {
    if (e.key === "Escape") closeLightbox();
    else if (e.key === "ArrowLeft" && SHOTS[lb.slug].length > 1) navLightbox(-1);
    else if (e.key === "ArrowRight" && SHOTS[lb.slug].length > 1) navLightbox(1);
    return;
  }
  if (e.key === "Escape") closeModal();
});
window.addEventListener("hashchange", render);
render();
</script>
